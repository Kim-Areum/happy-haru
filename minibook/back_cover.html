<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @page { size: 111mm 154mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: white; }
  .page { width: 111mm; height: 154mm; background: #FFFBF0; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding: 0; overflow: hidden; }
  .cover-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>
<div class="page">
  <img class="cover-img" src="back_cover.jpeg" alt="">
</div>
</body>
</html>
