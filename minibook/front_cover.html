<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @page { size: 111mm 154mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Ownglyph_PDH', -apple-system, sans-serif; background: white; }
  @font-face { font-family: 'Ownglyph_PDH'; src: url('../fonts/Ownglyph_PDH.ttf') format('truetype'); }
  .page { width: 111mm; height: 154mm; background: #FFFBF0; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding: 0; overflow: hidden; }
  .cover-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .cover-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,251,240,0) 50%, rgba(255,251,240,0.6) 85%); }
  .cover-title { position: relative; z-index: 1; font-size: 14pt; color: #433E34; text-align: center; margin-bottom: 18mm; line-height: 1.6; }
  .cover-title small { display: block; font-size: 6pt; color: #928A79; margin-top: 2mm; letter-spacing: 0.3mm; }
</style>
</head>
<body>
<div class="page">
  <img class="cover-img" src="cover.png" alt="">
  <div class="cover-overlay"></div>
  <div class="cover-title">
    나의 작은 행복 일기
    <small>2026. 3</small>
  </div>
</div>
</body>
</html>
